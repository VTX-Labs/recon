name: Docs

# Builds ONE GitHub Pages site covering BOTH implementations:
#   /          → a tabbed landing page (.github/docs-landing/index.html)
#   /node/     → TypeDoc API reference for @vtx-labs/recon
#   /python/   → pdoc API reference for the vtx-recon PyPI package
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".
# Live site: https://vtx-labs.github.io/recon/

on:
  push:
    branches: [main]
    paths:
      - "node/src/**"
      - "node/README.md"
      - "node/typedoc.json"
      - "python/src/**"
      - "python/README.md"
      - "python/docs/**"
      - "python/mkdocs.yml"
      - ".github/docs-landing/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # --- Node API docs (TypeDoc) -> site/node ---
      # This repo has no root package.json (the Node package lives in node/), so
      # action-setup can't read "packageManager" — pin the version explicitly.
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: node/pnpm-lock.yaml
      - name: Build Node docs (TypeDoc)
        working-directory: node
        run: |
          pnpm install --frozen-lockfile
          pnpm run docs

      # --- Python API docs (MkDocs Material + mkdocstrings) -> site/python ---
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Python docs (MkDocs)
        working-directory: python
        run: |
          python -m pip install -e . mkdocs-material "mkdocstrings[python]" ruff
          # README-style homepage (docs/index.md) + auto API reference (docs/api.md).
          python -m mkdocs build -d pydocs

      # --- Assemble the combined site ---
      - name: Assemble site
        run: |
          mkdir -p site
          cp .github/docs-landing/index.html site/index.html
          touch site/.nojekyll
          cp -r node/docs site/node
          cp -r python/pydocs site/python

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
