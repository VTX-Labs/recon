name: Publish PyPI (vtx-recon)

# Publishes the Python implementation in python/ to PyPI.
# Security: manual-only, repo-guarded, environment-gated, OIDC trusted publishing
# (no token). Pinned actions. See ../../CONVENTIONS.md §6.

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build and check the distribution, but skip the upload"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write # required for PyPI trusted publishing (OIDC)

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, verify & publish (PyPI)
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'VTX-Labs/recon' }}
    environment:
      name: release-pypi
      url: https://pypi.org/project/vtx-recon/
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install build + test tooling
        run: python -m pip install --upgrade build twine ".[dev]"
      - name: Lint & test (gate the release)
        run: |
          ruff check .
          pytest
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      # No API token: auth via PyPI trusted publishing (OIDC). The action reads
      # the id-token minted above. Uploads from python/dist.
      - name: Publish to PyPI
        if: ${{ inputs.dry-run == false }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: python/dist
      - name: Dry run summary
        if: ${{ inputs.dry-run == true }}
        run: echo "Dry run complete — built and checked dist; upload skipped."
