name: Publish npm (@vtx-labs/recon)

# Publishes the Node implementation in node/ to npm.
# Security: manual-only, repo-guarded, environment-gated, OIDC trusted publishing
# (no token), pinned actions. See ../../CONVENTIONS.md §6.

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run every step except the actual npm publish"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, verify & publish (npm)
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'VTX-Labs/recon' }}
    environment:
      name: release-npm
      url: https://www.npmjs.com/package/@vtx-labs/recon
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # pnpm/action-setup reads package.json from the repo root, but this is a
      # monorepo with the Node package under node/ and no root package.json --
      # so it cannot find the "packageManager" field. Pin the version here
      # explicitly (no conflict, since there is nothing at the root to clash with).
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: node/pnpm-lock.yaml
      # Trusted publishing requires npm >= 11.5.1.
      - name: Update npm (OIDC trusted publishing support)
        run: npm install -g npm@latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck, test, build
        run: |
          pnpm typecheck
          pnpm test
          pnpm build
      - name: Verify version is not already published
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "Publishing $NAME@$VERSION"
          if pnpm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::error::$NAME@$VERSION already exists on npm. Bump the version."
            exit 1
          fi
      # No NODE_AUTH_TOKEN: auth via OIDC trusted publishing; provenance automatic.
      - name: Publish (trusted publishing, public)
        if: ${{ inputs.dry-run == false }}
        run: npm publish --access public
      - name: Dry run summary
        if: ${{ inputs.dry-run == true }}
        run: echo "Dry run complete — build/test/verify passed; publish skipped."
