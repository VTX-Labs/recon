site_name: vtx-recon (Python)
site_description: Secret intelligence for authorized engagements — Python API reference.
site_url: https://vtx-labs.github.io/recon/python/
repo_url: https://github.com/VTX-Labs/recon
repo_name: VTX-Labs/recon
edit_uri: ""

theme:
  name: material
  palette:
    # Light / dark toggle, brand blue accent.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

nav:
  - Home: index.md
  - API reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: sphinx
            show_source: true
            show_root_heading: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/VTX-Labs
    - icon: fontawesome/solid/globe
      link: https://vtxlabs.dev
